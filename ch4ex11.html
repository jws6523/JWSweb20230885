<!DOCTYPE html>
<html lang="ko">
<head>
    <title>11번 문제</title>
</head>
<body>
    <h1>글 작성하기</h1>
    <table>
        <tr><th>
            <label for="user"><b>작성자</b></label>
        </th><td>
            <input type="text" id="user">
        </td></tr>
        <tr><th>
            <label for="id"><b>아이디</b></label>
        </th><td>
            <input type="text" id="id">
        </td></tr>
        <tr><th>

            <label for="email"><b>이메일</b></label>
        </th><td>
            <input type="text" id="email">
            <label for="@">@</label>
            <input type="text" id="@">
        </td></tr>
        <tr><th>
            <label for="number1"><b>휴대폰</b></label>
        </th><td>
            <select name="number1" id="number">
                <option>010</option>
                <option>070</option>
                <option>080</option>
            </select>
            <label for="number2">-</label>
            <input type="text" id="number" name="number2">
            <label for="number3">-</label>
            <input type="text" name="number3" id="number">
        </td></tr>
        <tr><th>
            <label for="title"><b>글제목</b></label>
        </th><td>
            <input type="text" id="title">
        </td></tr>
        <tr><th>
            <label for="content"><b>내용</b></label>
        </th><td>   
            <input type="text" id="content" style="height: 200px; width: 230px;">
        </td></tr>
        <th><td><input type="submit"></td></th>
    </table>
</body>
</html>
