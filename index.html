<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>단위 변환기</title>
    <script>
    function cminchfeet() {
    let cm = prompt("cm를 입력하세요");
    let inch = cm / 2.54;
    let feet = cm / 30.48;

    alert(cm + "cm = " + inch + "인치 / " + feet + "피트");
    }
    function cylindervolume() {
    let radius = prompt("반지름을 입력하세요");
    let height = prompt("높이를 입력하세요");
    let volume = Math.PI * radius * radius * height;
    alert("원기둥 부피 = " + volume );
    }
    function numberdigits() {
    let number = prompt("네자리 정수를 입력하세요");
    let thousand = number / 1000;
    let hundred = (number % 1000) / 100;
    let ten = (number % 100) / 10;
    let one = number % 10;
    alert("천의 자리수 = " + thousand.toFixed(0) + ", 백의 자리수 = " + hundred.toFixed(0) + ", 십의 자리수 = " + ten.toFixed(0) + ", 일의 자리수 = " + one.toFixed(0));
    }
  </script>
</head>
<body>
    <h1>cm 변환기</h1>
    <button onclick="cminchfeet()">cm를 인치와 피트로 변환</button>
    <hr>

    <h1>원기둥 부피계산</h1>
    <button onclick="cylindervolume()">원기둥 부피계산</button>
    <hr>

    <h1>네자리 정수입력후 천,백,십,일의 자리수 출력</h1>
    <button onclick="numberdigits()">네자리 정수입력후 천,백,십,일의 자리수 출력</button>
    <hr>
</body>
</html>
