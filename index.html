<!DOCTYPE html>
<html lang="ko">
<head>
    <title>7장 과제</title>
    <style>
        .container{
            width: 1080px;
            margin: 8px auto;
            display: flex;
            justify-content: space-between;

        }
        .right{
            background: blue;
            width: 332px; height: 428px;
        }
        .left{
            background: red;
            width: 740px; height: 428px;
        }
        .footer{
            height: 80px; width: 1080px;
            background: yellow;
        }
        ul.gnb{
            padding-bottom: 8px; padding-top: 8px;
            padding-left: 0px; padding-right: 0px;
            background: green;
        }
        ul.gnb > li {
            list-style-type: none;
            float: left;
            padding-left: 16px;
        }
        ul.gnb > li:first-child{
            padding-left: 0px;
        }
        ul.rank{
            background: yellow;
            padding-bottom: 8px; padding-top: 8px;
            list-style-type: none;
            padding-left: 0px;
        }
    </style>
</head>
<body>

    <div class="container"><h1>Logo</h1></div>
    <div class="container">
        <ul class="gnb">
            <li>메일</li>
            <li>카페</li>
            <li>블로그</li>
            <li>쇼핑</li>
            <li>사전</li>
            <li>뉴스</li>
            <li>증권</li>
            <li>부동산</li>
            <li>지도</li>
        </ul>
        <ul class="rank">
            <li>실시간 검색 순위</li>
        </ul>
    </div>
    <div class="container">
        <div class="left"></div>
        <div class="right"></div>
    </div>
    <div class="container">
        <div class="left"></div>
        <div class="right"></div>
    </div>
    <div class="container">
        <div class="footer"></div>
    </div>
</body>
</html>
